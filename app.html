<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seibi — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #000000;
      --accent: #8b7cf7;
      --accent-deep: #6c5ce7;
      --text: #ffffff;
      --muted: #8a8f9e;
      --splash-bg: #fdf5cb;
      --milano-red: #c40000;
      --ease-smooth: cubic-bezier(0.33, 1, 0.68, 1);
      --transition-depth: 1.15s;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050505;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: var(--text);
    }

    .preview-label {
      position: fixed;
      top: 1.25rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #555;
    }

    .phone {
      position: relative;
      width: 390px;
      height: 844px;
      background: #000;
      border-radius: 52px;
      padding: 12px;
      box-shadow:
        0 0 0 1px #1a1a1a,
        0 50px 100px rgba(0, 0, 0, 0.8);
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 20;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      background: var(--splash-bg);
      border-radius: 42px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      perspective: 1400px;
    }

    .brand {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 3.5rem 1.5rem 0.5rem;
    }

    .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 0.5rem;
    }

    .logo .sei { color: var(--black); }
    .logo .bi { color: var(--milano-red); }

    .tagline {
      font-size: 0.8rem;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.88);
      letter-spacing: 0.01em;
    }

    .visual {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      padding: 0 0.5rem;
    }

    .hero-image {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
    }

    .welcome-section {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 0 2rem 1rem;
    }

    .welcome-title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--black);
      margin-bottom: 0.4rem;
    }

    .welcome-sub {
      font-size: 0.78rem;
      font-weight: 400;
      color: rgba(0, 0, 0, 0.88);
      line-height: 1.55;
      max-width: 300px;
      margin: 0 auto;
    }

    .auth {
      position: relative;
      z-index: 10;
      padding: 0 1.75rem 2.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      padding: 0.95rem 1.25rem;
      border: none;
      border-radius: 50px;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    .btn:active { transform: scale(0.98); }

    .btn-light {
      background: #fff;
      color: #111;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .btn-light:hover {
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .terms {
      text-align: center;
      font-size: 0.65rem;
      color: rgba(0, 0, 0, 0.88);
      line-height: 1.6;
      margin-top: 0.35rem;
    }

    .terms a {
      color: var(--milano-red);
      text-decoration: none;
    }

    /* ── Splash screen (pantalla de carga) ── */
    .splash {
      position: absolute;
      inset: 0;
      z-index: 50;
      background: var(--splash-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 42px;
      overflow: hidden;
      transform: scale(1) translateZ(0);
      will-change: transform, opacity;
      transition:
        opacity var(--transition-depth) var(--ease-smooth),
        transform var(--transition-depth) var(--ease-smooth),
        visibility var(--transition-depth);
    }

    .splash.transitioning {
      opacity: 0;
      transform: scale(0.97) translateZ(-72px);
      pointer-events: none;
    }

    .splash.hide {
      visibility: hidden;
      pointer-events: none;
    }

    .splash-car-wrap {
      position: relative;
      width: 82%;
      height: 48%;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: carZoom 1s var(--ease-smooth) 0.2s forwards;
      opacity: 0;
      transform: scale(0.94);
    }

    .splash-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: transparent;
    }

    .splash-footer {
      position: absolute;
      bottom: 4.25rem;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .splash-name {
      animation: nameIn 0.9s var(--ease-smooth) 0.7s forwards;
      opacity: 0;
      transform: translateY(14px);
    }

    .splash-progress {
      width: 44px;
      height: 3px;
      background: rgba(196, 0, 0, 0.18);
      border-radius: 3px;
      overflow: hidden;
      animation: nameIn 0.6s ease 0.95s forwards;
      opacity: 0;
    }

    .splash-progress::after {
      content: '';
      display: block;
      height: 100%;
      width: 0%;
      background: var(--milano-red);
      border-radius: 3px;
      animation: loadBar 2.8s var(--ease-smooth) 0.5s forwards;
    }

    /* Main app — hidden until splash ends */
    .main-app {
      display: flex;
      flex-direction: column;
      flex: 1;
      background-color: var(--splash-bg);
      opacity: 0;
      transform: scale(0.97) translateZ(-88px);
      will-change: transform, opacity;
      transition:
        opacity var(--transition-depth) var(--ease-smooth),
        transform var(--transition-depth) var(--ease-smooth);
    }

    .main-app.visible {
      opacity: 1;
      transform: scale(1) translateZ(0);
    }

    .main-app .brand,
    .main-app .visual,
    .main-app .welcome-section,
    .main-app .auth {
      opacity: 1;
      transform: none;
    }

    @keyframes nameIn {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes carZoom {
      to { opacity: 1; transform: scale(1); }
    }

    @keyframes loadBar {
      to { width: 100%; }
    }
  </style>
</head>
<body>

  <p class="preview-label">Vista previa — Seibi App</p>

  <div class="phone">
    <div class="screen">

      <!-- Pantalla de carga animada -->
      <div class="splash" id="splash">
        <div class="splash-car-wrap">
          <video
            class="splash-video"
            id="splashVideo"
            autoplay
            muted
            loop
            playsinline
            preload="auto"
          >
            <source src="assets/splash-car-clean.webm?v=5" type="video/webm">
            <source src="assets/splash-car-clean.mp4?v=5" type="video/mp4">
          </video>
        </div>
        <div class="splash-footer">
          <h1 class="logo splash-name"><span class="sei">Sei</span><span class="bi">bi</span></h1>
          <div class="splash-progress"></div>
        </div>
      </div>

      <!-- Pantalla principal -->
      <div class="main-app" id="mainApp">

      <div class="brand">
        <h1 class="logo"><span class="sei">Sei</span><span class="bi">bi</span></h1>
        <p class="tagline">Mantenimiento con total claridad</p>
      </div>

      <div class="visual">
        <img class="hero-image" src="assets/login-hero.png?v=6" alt="Garaje con vehículo">
      </div>

      <div class="welcome-section">
        <h2 class="welcome-title">Bienvenido</h2>
        <p class="welcome-sub">Historial de servicios, recordatorios por kilometraje y estimados de costo</p>
      </div>

      <div class="auth">
        <button class="btn btn-light" type="button">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
          </svg>
          Continuar con Apple
        </button>

        <button class="btn btn-light" type="button">
          <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Iniciar sesión con Google
        </button>

        <p class="terms">
          Al continuar, aceptas nuestros <a href="#">Términos de servicio</a> y <a href="#">Política de privacidad</a>.
        </p>
      </div>

      </div><!-- /main-app -->

    </div>
  </div>

  <script>
    const splash = document.getElementById('splash');
    const mainApp = document.getElementById('mainApp');
    const splashVideo = document.getElementById('splashVideo');
    const splashProgress = splash.querySelector('.splash-progress');
    const TRANSITION_MS = 1150;
    const PAUSE_AFTER_SPLASH_MS = 280;

    splashVideo.play().catch(() => {});

    let transitionStarted = false;

    function beginLoginTransition() {
      if (transitionStarted) return;
      transitionStarted = true;

      setTimeout(() => {
        splash.classList.add('transitioning');
        mainApp.classList.add('visible');

        setTimeout(() => {
          splash.classList.add('hide');
          splashVideo.pause();
        }, TRANSITION_MS);
      }, PAUSE_AFTER_SPLASH_MS);
    }

    splashProgress.addEventListener('animationend', (event) => {
      if (event.animationName === 'loadBar') beginLoginTransition();
    });

    // Fallback: loadBar termina a los 3.3s (0.5s delay + 2.8s duración)
    setTimeout(beginLoginTransition, 3600);
  </script>

</body>
</html>
