server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Never cache the app shell or service worker so updates roll out immediately.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Fingerprinted assets can be cached aggressively.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Client-side routing (TanStack Router): fall back to the SPA entrypoint.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
